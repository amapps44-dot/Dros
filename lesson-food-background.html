<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>درس الطعام والمطاعم</title>

    <style>
        body {
            margin: 0;
            font-family: "Cairo", sans-serif;
            background: #f5e8d3;
            color: #4a3422;
        }

        .page {
            min-height: 100vh;
            background-image:
                linear-gradient(to bottom, rgba(255,255,255,0.6), rgba(255,255,255,0.3)),
                url("BACKGROUND.jpg");
            background-size: cover;
            background-position: center;
            padding: 30px 15px;
        }

        .content {
            max-width: 900px;
            margin: auto;
            background: rgba(255, 250, 240, 0.92);
            border-radius: 18px;
            padding: 25px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.18);
        }

        .dropdown-container {
            display: inline-block;
            position: relative;
            margin-bottom: 15px;
            margin-left: 10px;
        }

        .dropdown-btn {
            display: inline-block;
            color: white;
            font-size: 16px;
            background: #d89860;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f0dfc3;
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 8px;
            right: 0;
            top: 100%;
            margin-top: 5px;
            border: 1px solid #d89860;
        }

        .dropdown-content a {
            color: #7a4a2a;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 15px;
            border-bottom: 1px solid rgba(120, 80, 40, 0.2);
        }

        .dropdown-container:hover .dropdown-content {
            display: block;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #fff7e6;
            border-radius: 14px;
            padding: 15px;
            border: 1px solid rgba(120, 80, 40, 0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .card img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
            margin-top: 35px
